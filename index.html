<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GabMath Mobile - QR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="qr">
  <main class="app-shell">
    <section class="card">
      <h1>GabMath Mobile</h1>
      <p class="subtitle">Leia o QR Code e em seguida alinhe o cartão-resposta (sem reabrir a câmera).</p>

      <div class="status-bar">
        <span id="mode-badge" class="mode-badge">Lendo QR</span>
      </div>

      <div id="camera-panel" class="camera-stack hidden">
        <video id="camera-video" playsinline muted></video>
        <canvas id="camera-overlay"></canvas>
      </div>

      <div id="step-qr" class="step">
        <h2>Leitura do QR</h2>
        <div class="actions">
          <button id="start-scan">Iniciar câmera</button>
          <button id="stop-scan" class="secondary">Parar</button>
        </div>
        <label class="field">
          <span>Ou cole manualmente o conteúdo bruto do QR</span>
          <input id="proof-id-input" type="text" placeholder="Ex.: GABMATH1:eyJ2IjoxLCJpIjoiLi4uIn0">
        </label>
        <button id="load-proof" class="full">Prosseguir para leitura do cartão</button>
        <p id="scan-status" class="status"></p>
      </div>

      <div id="step-card" class="step hidden">
        <h2>Cartão-resposta</h2>
        <div id="proof-summary" class="summary"></div>
        <p class="hint">Alinhe os quatro quadradinhos pretos do cartão-resposta com as marcações da grade e toque em “Capturar foto”.</p>
        <div class="actions single-column">
          <button id="enable-camera" class="full">Habilitar câmera</button>
          <button id="capture-photo" class="full hidden">Capturar foto</button>
          <button id="retake-photo" class="secondary full hidden">Tirar nova foto</button>
          <button id="confirm-reading" class="full hidden">Confirmar leitura</button>
          <button id="cancel-reading" class="secondary full hidden">Cancelar</button>
          <button id="disable-camera" class="secondary full hidden">Desabilitar câmera</button>
        </div>
        <label class="debug-toggle">
          <input id="debug-toggle" type="checkbox">
          Debug (mostrar grade e marcadores)
        </label>
        <p id="card-status" class="status"></p>
        <canvas id="aligned-preview" class="aligned-preview"></canvas>
        <div id="answer-grid" class="answer-grid"></div>
        <div id="result-panel" class="result hidden"></div>
        <div class="actions single-column">
          <button id="back-to-qr" class="secondary full">Ler outro QR</button>
        </div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>
  <script src="app.js"></script>
</body>
</html>
