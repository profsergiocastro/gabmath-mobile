<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GabMath Mobile - QR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="qr">
  <main class="app-shell">
    <section class="card">
      <h1>GabMath Mobile</h1>
      <p class="subtitle">Etapa 1: leia apenas o QR Code da prova.</p>

      <div class="status-bar">
        <span id="mode-badge" class="mode-badge">Lendo QR</span>
      </div>

      <div class="step">
        <h2>Leitura do QR</h2>
        <div class="camera-stack">
          <video id="camera-video" playsinline muted></video>
          <canvas id="camera-overlay"></canvas>
        </div>
        <div class="actions">
          <button id="start-scan">Iniciar camera</button>
          <button id="stop-scan" class="secondary">Parar</button>
        </div>
        <label class="field">
          <span>Ou cole manualmente o conteudo bruto do QR</span>
          <input id="proof-id-input" type="text" placeholder="Ex.: GABMATH1:eyJ2IjoxLCJpIjoiLi4uIn0">
        </label>
        <button id="load-proof" class="full">Prosseguir para leitura do cartao</button>
        <p id="scan-status" class="status"></p>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>
  <script src="app.js"></script>
</body>
</html>
